<svg fill="none" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Animações Core - Mantendo performance máxima */
    @keyframes drawProgress { from { stroke-dashoffset: 283; } to { stroke-dashoffset: 0; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulseGlow {
      0% { filter: drop-shadow(0 0 3px rgba(16, 185, 129, 0.4)); }
      50% { filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.7)); }
      100% { filter: drop-shadow(0 0 3px rgba(16, 185, 129, 0.4)); }
    }
    
    /* Animações de Rotação 3D Simulada */
    @keyframes rotateY_CW { 
      0% { transform: scaleX(1); opacity: 0.1; } 
      50% { transform: scaleX(0); opacity: 0.6; } 
      100% { transform: scaleX(1); opacity: 0.1; } 
    }
    @keyframes rotateY_CCW { 
      0% { transform: scaleX(0); opacity: 0.6; } 
      50% { transform: scaleX(1); opacity: 0.1; } 
      100% { transform: scaleX(0); opacity: 0.6; } 
    }

    /* Definição das classes de animação */
    .animate-draw { stroke-dasharray: 283; stroke-dashoffset: 283; animation: drawProgress 1.5s ease-out forwards; }
    .animate-fade { opacity: 0; animation: fadeIn 1s ease-out 1.2s forwards; }
    .glowing-score { animation: pulseGlow 3s infinite; }
    
    /* Classes das Órbitas 3D - Origem centralizada em cx=120 cy=80 */
    .orbit-cw { transform-origin: 120px 80px; animation: rotateY_CW 4s linear infinite; }
    .orbit-ccw { transform-origin: 120px 80px; animation: rotateY_CCW 4s linear infinite; }
    
    /* Efeitos do botão PageSpeed */
    #pagespeed-button { transition: all 0.2s ease-in-out; cursor: pointer; }
    #pagespeed-button:hover rect { fill: #2563EB; }
  </style>

  <defs>
    <radialGradient id="sphereGradient" cx="120" cy="80" r="45" fx="110" fy="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A1B26" stop-opacity="0.8"/>
    </radialGradient>
  </defs>

  <rect width="800" height="200" rx="10" fill="#16161E" stroke="#1F2937" stroke-width="1"/>
  <rect width="790" height="190" x="5" y="5" rx="8" fill="#1A1B26" />

  <g id="performance-orb">
    <circle cx="120" cy="80" r="45" stroke="#1F2937" stroke-width="10"/>
    
    <g class="animate-fade">
      <circle cx="120" cy="80" r="45" fill="url(#sphereGradient)"/>

      <ellipse cx="120" cy="80" rx="45" ry="1" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1" transform="rotate(0 120 80)"/>
      
      <ellipse cx="120" cy="80" rx="45" ry="45" stroke="#10B981" stroke-opacity="0.1" stroke-width="1" class="orbit-cw"/>
      <ellipse cx="120" cy="80" rx="45" ry="45" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1" class="orbit-ccw" transform="rotate(30 120 80)"/>
      <ellipse cx="120" cy="80" rx="45" ry="45" stroke="#10B981" stroke-opacity="0.1" stroke-width="1" class="orbit-cw" transform="rotate(60 120 80)"/>
      <ellipse cx="120" cy="80" rx="45" ry="45" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1" class="orbit-ccw" transform="rotate(90 120 80)"/>
    </g>
    
    <circle cx="120" cy="80" r="45" stroke="#10B981" stroke-width="10" stroke-linecap="round" transform="rotate(-90 120 80)" class="animate-draw" />
    
    <text x="120" y="92" font-family="Fira Code, monospace" font-size="38" font-weight="700" fill="#10B981" text-anchor="middle" class="animate-fade glowing-score">100</text>
    <text x="120" y="160" font-family="Fira Code, monospace" font-size="12" fill="#94A3B8" text-anchor="middle">PERFORMANCE</text>
  </g>
  
  <text x="240" y="60" font-family="Fira Code, monospace" font-size="16" fill="#FFFFFF">SITE ALVO:</text>
  <text x="240" y="85" font-family="Fira Code, monospace" font-size="20" font-weight="600" fill="#3B82F6">highmedeletrica.com.br</text>
  
  <text x="240" y="130" font-family="Fira Code, monospace" font-size="12" fill="#10B981">● LCP: &lt;0.8s</text>
  <text x="350" y="130" font-family="Fira Code, monospace" font-size="12" fill="#10B981">● FID: 1ms</text>
  <text x="450" y="130" font-family="Fira Code, monospace" font-size="12" fill="#10B981">● CLS: 0.0</text>

  <a href="https://pagespeed.web.dev/analysis?url=https://www.highmedeletrica.com.br/?v=1">
    <g id="pagespeed-button">
      <rect x="550" y="80" width="220" height="50" rx="8" fill="#3B82F6"/>
      <text x="660" y="110" font-family="Fira Code, monospace" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">TESTAR NO PAGESPEED →</text>
    </g>
  </a>
</svg>
